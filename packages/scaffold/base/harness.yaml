sensors:
  - id: spec-validate
    kind: sensor.script
    execution: computational
    builtin: spec-validate
    on_fail: block
    fix_hint: Fix delta spec format; ensure each Requirement has >=1 Scenario and
      EARS-style requirement text
    stage: dev
    task: propose
  - id: spec-trace
    kind: sensor.script
    execution: computational
    builtin: spec-trace
    on_fail: block
    stage: dev
    task: verify
  - id: ai-spec-review
    kind: sensor.rubric
    execution: inferential
    builtin: rubric
    on_fail: warn
    budget_tokens: 8000
    stage: dev
    task: verify
  - id: fixture-guard
    kind: sensor.fixture
    execution: computational
    trigger: file-save
    scope:
      - tests/fixtures/**
    builtin: fixture-hash
    on_fail: block
  - id: typecheck
    kind: sensor.script
    execution: computational
    builtin: typecheck
    on_fail: block
    fix_hint: Fix TypeScript errors reported by tsc
    stage: dev
    task: apply
  - id: lint
    kind: sensor.script
    execution: computational
    builtin: lint
    on_fail: block
    fix_hint: Fix lint violations
    stage: dev
    task: apply
  - id: unit-changed
    kind: sensor.script
    execution: computational
    builtin: unit-changed
    on_fail: block
    fix_hint: Fix failing tests related to your diff
    stage: dev
    task: apply
  - id: mutation-probe
    kind: sensor.mutation
    execution: computational
    builtin: mutation-probe
    on_fail: block
    fix_hint: Strengthen scenario tests — avoid stubs and tautological assertions
    stage: dev
    task: verify
  - id: requirements-complete
    kind: sensor.script
    execution: computational
    builtin: requirements-complete
    on_fail: block
    fix_hint: Fill requirements/ artifacts and link PRD in proposal.md
    stage: dev
    task: propose
  - id: design-hld-complete
    kind: sensor.script
    execution: computational
    builtin: design-hld-complete
    on_fail: block
    fix_hint: Complete design/overview.md HLD sections (API, ADR, Observability,
      Rollback)
    stage: dev
    task: design
  - id: design-lld-complete
    kind: sensor.script
    execution: computational
    builtin: design-lld-complete
    on_fail: warn
    fix_hint: Add design/ui/pages.md and per-page LLD under design/ui/components/
    stage: dev
    task: design
  - id: design-spec-align
    kind: sensor.script
    execution: computational
    builtin: design-spec-align
    on_fail: warn
    fix_hint: Ensure API paths in design appear in delta specs
    stage: dev
    task: design
  - id: plan-coverage
    kind: sensor.script
    execution: computational
    builtin: plan-coverage
    on_fail: warn
    fix_hint: Run hx plan to generate @design= and delivery-trace.yaml handoff
    stage: dev
    task: plan
  - id: design-drift
    kind: sensor.script
    execution: computational
    builtin: design-drift
    on_fail: warn
    fix_hint: Implement files listed in delivery-trace code_hints or update the trace
    stage: dev
    task: verify
  - id: prototype-complete
    kind: sensor.script
    execution: computational
    builtin: prototype-complete
    on_fail: block
    fix_hint: Add design/ui/pages.md wireframe inventory (prototype-wireframe skill)
    stage: dev
    task: design
  - id: uat-complete
    kind: sensor.script
    execution: computational
    builtin: uat-complete
    on_fail: block
    fix_hint: Complete change/uat-checklist.md with scenario walkthrough and sign-off
    stage: dev
    task: verify
  - id: drift
    kind: sensor.drift
    execution: computational
    builtin: drift
    on_fail: warn
    fix_hint: Run hx sync; fix spec↔code or design↔code drift; hx adapter sync for
      adapter drift
    stage: dev
    task: verify
  - id: integration-smoke
    kind: sensor.script
    execution: computational
    builtin: integration-smoke
    on_fail: warn
    timeout_ms: 120000
    fix_hint: Add npm run test:integration or fix failing integration tests
    stage: dev
    task: verify
  - id: prd-complete
    kind: sensor.script
    execution: computational
    builtin: prd-complete
    on_fail: block
    fix_hint: Complete docs/prd/<slug>.md per prd-template
    stage: req
    task: prd-writing
  - id: prd-approved
    kind: sensor.script
    execution: computational
    builtin: prd-approved
    on_fail: block
    fix_hint: "Human approves PRD: hx gate approve --gate prd --prd <slug>
      --approver <name>"
    stage: req
    task: prd-writing
  - id: arch-hld-complete
    kind: sensor.script
    execution: computational
    builtin: arch-hld-complete
    on_fail: block
    fix_hint: Complete docs/architecture/overview.md HLD sections
    stage: arch
    task: subsystem-division
  - id: arch-registry-complete
    kind: sensor.script
    execution: computational
    builtin: arch-registry-complete
    on_fail: block
    fix_hint: Fix registry.yaml and ensure active modules have LLD paths
    stage: arch
    task: subsystem-division
  - id: arch-lld-complete
    kind: sensor.script
    execution: computational
    builtin: arch-lld-complete
    on_fail: block
    fix_hint: Complete module LLD under docs/architecture/modules/<id>/lld.md
    stage: arch
    task: internal-interface
  - id: arch-module-boundary
    kind: sensor.script
    execution: computational
    builtin: arch-module-boundary
    on_fail: warn
    fix_hint: Resolve duplicate capability ownership in registry.yaml
    stage: arch
    task: internal-interface
  - id: arch-change-align
    kind: sensor.script
    execution: computational
    builtin: arch-change-align
    on_fail: block
    fix_hint: Ensure touched domains map to module LLD in docs/architecture/
    stage: dev
    task: design
  - id: arch-approved
    kind: sensor.script
    execution: computational
    builtin: arch-approved
    on_fail: block
    fix_hint: "Human approves global HLD: hx gate approve --gate arch --approver <name>"
    stage: arch
    task: subsystem-division
  - id: arch-drift
    kind: sensor.script
    execution: computational
    builtin: arch-drift
    on_fail: warn
    fix_hint: Run hx arch promote <change> to沉淀 design into module LLD
    stage: dev
    task: verify
  - id: wo-req-arch-clear
    kind: sensor.script
    execution: computational
    builtin: wo-req-arch-clear
    on_fail: block
    fix_hint: "Close pending req/arch work orders: hx wo inbox"
    stage: dev
    task: propose
  - id: requirements-extended-complete
    kind: sensor.script
    execution: computational
    builtin: requirements-extended-complete
    on_fail: block
    fix_hint: Fill extended requirements/ artifacts (research, business flows,
      integrations)
    stage: dev
    task: propose
  - id: test-cases-complete
    kind: sensor.script
    execution: computational
    builtin: test-cases-complete
    on_fail: block
    fix_hint: Complete test-cases/overview.md — hx test-cases init
    stage: test
    task: test-case-design
  - id: test-cases-approved
    kind: sensor.script
    execution: computational
    builtin: test-cases-approved
    on_fail: block
    fix_hint: "Submit and approve test cases: hx test-cases submit"
    stage: test
    task: test-case-design
  - id: bugs-closed
    kind: sensor.script
    execution: computational
    builtin: bugs-closed
    on_fail: block
    fix_hint: "Close or fix open bugs: hx bug list"
    stage: dev
    task: verify
  - id: wo-lld-done
    kind: sensor.script
    execution: computational
    builtin: wo-lld-done
    on_fail: block
    fix_hint: "Mark lld-design work orders done: hx wo done <id>"
    stage: dev
    task: plan
  - id: arch-lld-approved
    kind: sensor.script
    execution: computational
    builtin: arch-lld-approved
    on_fail: block
    fix_hint: "Approve module LLD: hx approve arch-lld <module> --approver <name>"
    stage: dev
    task: design
  - id: change-request-applied
    kind: sensor.script
    execution: computational
    builtin: change-request-applied
    on_fail: block
    fix_hint: Apply pending change requests after approval
    stage: dev
    task: design
