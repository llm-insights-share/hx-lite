sensors:
  - id: spec-validate
    kind: sensor.script
    execution: computational
    check: inline
    expr: "spec.ears_ok == true"
    source: assets/sensors/spec-validate
    on_fail: block
    fix_hint: Fix delta spec format; ensure each Requirement has >=1 Scenario and
      EARS-style requirement text
    stage: dev
    task: propose
  - id: spec-trace
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.spec-trace"
    on_fail: block
    stage: dev
    task: verify
  - id: ai-spec-review
    kind: sensor.rubric
    execution: inferential
    check: rules
    rules_file: assets/rubrics/team-review/rules.yaml
    input:
      - proposal.md
      - specs/**/spec.md
    source: assets/sensors/ai-spec-review
    on_fail: warn
    budget_tokens: 8000
    stage: dev
    task: verify
  - id: fixture-guard
    kind: sensor.fixture
    execution: computational
    trigger: file-save
    scope:
      - tests/fixtures/**
    check: inline
    expr: "fixture.hash_ok == true"
    source: assets/sensors/fixture-guard
    on_fail: block
  - id: typecheck
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.typecheck"
    source: assets/sensors/typecheck
    on_fail: block
    fix_hint: Fix TypeScript errors reported by tsc
    stage: dev
    task: apply
  - id: lint
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.lint"
    config:
      preset: lint
    on_fail: block
    fix_hint: Fix lint violations
    stage: dev
    task: apply
  - id: unit-changed
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.unit-changed"
    config:
      preset: unit-changed
    on_fail: block
    fix_hint: Fix failing tests related to your diff
    stage: dev
    task: apply
  - id: mutation-probe
    kind: sensor.mutation
    execution: computational
    check: inline
    expr: "mutation.ok == true"
    on_fail: block
    fix_hint: Strengthen scenario tests — avoid stubs and tautological assertions
    stage: dev
    task: verify
  - id: requirements-complete
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.requirements-complete"
    on_fail: block
    fix_hint: Fill requirements/ artifacts and link PRD in proposal.md
    stage: dev
    task: propose
  - id: design-hld-complete
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.design-hld-complete"
    on_fail: block
    fix_hint: Complete design/overview.md HLD sections (API, ADR, Observability,
      Rollback)
    stage: dev
    task: design
  - id: design-lld-complete
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.design-lld-complete"
    on_fail: warn
    fix_hint: Add design/ui/pages.md and per-page LLD under design/ui/components/
    stage: dev
    task: design
  - id: design-spec-align
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.design-spec-align"
    on_fail: warn
    fix_hint: Ensure API paths in design appear in delta specs
    stage: dev
    task: design
  - id: plan-coverage
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.plan-coverage"
    on_fail: warn
    fix_hint: Run hx plan to generate @design= and delivery-trace.yaml handoff
    stage: dev
    task: plan
  - id: design-drift
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.design-drift"
    on_fail: warn
    fix_hint: Implement files listed in delivery-trace code_hints or update the trace
    stage: dev
    task: verify
  - id: uat-complete
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.uat-complete"
    on_fail: block
    fix_hint: Complete change/uat-checklist.md with scenario walkthrough and sign-off
    stage: test
    task: test-execution
  - id: drift
    kind: sensor.drift
    execution: computational
    check: inline
    expr: "drift.ok == true"
    on_fail: warn
    fix_hint: Run hx sync; fix spec↔code or design↔code drift; hx adapter sync for
      adapter drift
    stage: dev
    task: verify
  - id: integration-smoke
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.integration-smoke"
    on_fail: warn
    timeout_ms: 120000
    fix_hint: Add npm run test:integration or fix failing integration tests
    stage: dev
    task: verify
  - id: prototype-complete
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.prototype-complete"
    on_fail: block
    fix_hint: Add design/ui/pages.md or docs/prd/<slug>/prototype/pages.md (prototype-wireframe)
    stage: dev
    task: design
  - id: prd-complete
    kind: sensor.script
    execution: computational
    check: inline
    expr: "doc.sections_complete"
    source: assets/sensors/prd-complete
    on_fail: block
    fix_hint: Complete docs/prd/<slug>.md per prd-template
    stage: req
    task: prd-writing
  - id: prd-approved
    kind: sensor.script
    execution: computational
    check: inline
    expr: "approval.prd == true"
    source: assets/sensors/prd-approved
    on_fail: block
    fix_hint: "Human approves PRD: hx gate approve --gate prd --prd <slug>
      --approver <name>"
    stage: req
    task: prd-writing
  - id: arch-hld-complete
    kind: sensor.script
    execution: computational
    check: inline
    expr: "doc.sections_complete"
    source: assets/sensors/arch-hld-complete
    on_fail: block
    fix_hint: Complete docs/architecture/overview.md HLD sections
    stage: arch
    task: subsystem-division
  - id: arch-registry-complete
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.arch-registry-complete"
    on_fail: block
    fix_hint: Fix registry.yaml and ensure active modules have LLD paths
    stage: arch
    task: subsystem-division
  - id: arch-lld-complete
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.arch-lld-complete"
    on_fail: block
    fix_hint: Complete module LLD under docs/architecture/modules/<id>/lld.md
    stage: arch
    task: internal-interface
  - id: arch-module-boundary
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.arch-module-boundary"
    on_fail: warn
    fix_hint: Resolve duplicate capability ownership in registry.yaml
    stage: arch
    task: internal-interface
  - id: arch-change-align
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.arch-change-align"
    on_fail: block
    fix_hint: Ensure touched domains map to module LLD in docs/architecture/
    stage: dev
    task: design
  - id: arch-approved
    kind: sensor.script
    execution: computational
    check: inline
    expr: "approval.arch == true"
    config:
      gate: arch
    on_fail: block
    fix_hint: "Human approves global HLD: hx gate approve --gate arch --approver <name>"
    stage: arch
    task: subsystem-division
  - id: arch-drift
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.arch-drift"
    on_fail: warn
    fix_hint: Run hx arch promote <change> to沉淀 design into module LLD
    stage: dev
    task: verify
  - id: wo-req-arch-clear
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.wo-req-arch-clear"
    on_fail: block
    fix_hint: "Close pending req/arch work orders: hx wo inbox"
    stage: dev
    task: propose
  - id: requirements-extended-complete
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.requirements-extended-complete"
    on_fail: block
    fix_hint: Fill extended requirements/ artifacts (research, business flows,
      integrations)
    stage: dev
    task: propose
  - id: test-cases-complete
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.test-cases-complete"
    on_fail: block
    fix_hint: Author test-cases/overview.md via test-case-design command/skill (hx test-cases init only creates dirs)
    stage: test
    task: test-case-design
  - id: test-cases-approved
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.test-cases-approved"
    on_fail: block
    fix_hint: "Submit and approve test cases: hx test-cases submit"
    stage: test
    task: test-case-design
  - id: bugs-closed
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.bugs-closed"
    on_fail: block
    fix_hint: "Close or fix open bugs: hx bug list"
    stage: test
    task: test-execution
  - id: test-report-complete
    kind: sensor.script
    execution: computational
    check: inline
    expr: "handler.test-report-complete"
    on_fail: block
    fix_hint: "Author changes/<id>/test-report.md via test-execution command/skill (hx test report init only creates dirs)"
    stage: test
    task: test-execution
  - id: req-biz-understanding
    kind: sensor.script
    execution: computational
    check: inline
