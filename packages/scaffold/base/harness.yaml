version: "1.0"
constitution: constitution.md
profiles:
  lite:
    stages:
      - dev
    tasks:
      dev:
        - id: propose
          suite: fast-lite
        - id: apply
          suite: fast-lite
        - id: archive
          suite: archive-check
  standard:
    stages:
      - req
      - arch
      - dev
      - test
    tasks:
      req:
        - id: requirements-analysis
          suite: req-analysis
        - id: prototype-design
          suite: req-prototype
        - id: prd-writing
          suite: prd-check
      arch:
        - id: subsystem-division
          suite: arch-subsystem
        - id: tech-selection
          suite: arch-tech
        - id: database-design
          suite: arch-db
        - id: interface-design
          suite: arch-iface
        - id: internal-interface
          suite: arch-lld-check
      dev:
        - id: plan
          suite: plan-basic
        - id: propose
          suite: propose-basic
        - id: design
          suite: design-basic
        - id: apply
          suite: fast
        - id: verify
          suite: verification
        - id: archive
          suite: archive-check
      test:
        - id: test-case-design
          suite: test-design-sdlc
        - id: test-execution
          suite: test-execution-sdlc
    # Optional task suite bindings (not in check-all enabled set)
    suites:
      req.biz-understanding: req-biz
      req.requirements-research: req-research
      arch.key-mechanisms: arch-key
  strict:
    stages:
      - req
      - arch
      - dev
      - test
    tasks:
      req:
        - id: requirements-analysis
          suite: req-analysis
        - id: prototype-design
          suite: req-prototype
        - id: prd-writing
          suite: prd-check
      arch:
        - id: subsystem-division
          suite: arch-subsystem
        - id: tech-selection
          suite: arch-tech
        - id: database-design
          suite: arch-db
        - id: interface-design
          suite: arch-iface
        - id: internal-interface
          suite: arch-lld-check
      dev:
        - id: plan
          suite: plan-basic
        - id: propose
          suite: propose-basic
        - id: design
          suite: design-basic
        - id: apply
          suite: fast
        - id: verify
          suite: verification-strict
        - id: archive
          suite: archive-check
      test:
        - id: test-case-design
          suite: test-design-sdlc
        - id: test-execution
          suite: test-execution-sdlc
    suites:
      req.biz-understanding: req-biz
      req.requirements-research: req-research
      arch.key-mechanisms: arch-key
  enterprise:
    stages:
      - req
      - arch
      - dev
      - test
    tasks:
      req:
        - id: requirements-analysis
          suite: req-analysis
        - id: prototype-design
          suite: req-prototype
        - id: prd-writing
          suite: prd-check
      arch:
        - id: subsystem-division
          suite: arch-subsystem
        - id: tech-selection
          suite: arch-tech
        - id: database-design
          suite: arch-db
        - id: interface-design
          suite: arch-iface
        - id: internal-interface
          suite: arch-lld-check
      dev:
        - id: plan
          suite: plan-sdlc
        - id: propose
          suite: propose-sdlc
        - id: design
          suite: design-sdlc
        - id: apply
          suite: fast
        - id: verify
          suite: verification-sdlc
        - id: archive
          suite: archive-check
      test:
        - id: test-case-design
          suite: test-design-sdlc
        - id: test-execution
          suite: test-execution-sdlc
    suites:
      req.biz-understanding: req-biz
      req.requirements-research: req-research
      arch.key-mechanisms: arch-key
suites:
  fast-lite:
    - spec-validate
  fast:
    - spec-validate
    - typecheck
    - lint
    - unit-changed
  verification:
    - spec-validate
    - spec-trace
    - drift
    - integration-smoke
  verification-strict:
    - spec-validate
    - spec-trace
    - unit-changed
    - mutation-probe
    - ai-spec-review
    - integration-smoke
  req-biz:
    - req-biz-understanding
  req-research:
    - req-research-complete
  req-analysis:
    - req-analysis-complete
  req-prototype:
    - org-prototype-complete
  prd-check:
    - prd-complete
    - prd-approved
  arch-subsystem:
    - arch-hld-complete
    - arch-registry-complete
  arch-tech:
    - arch-tech-selection-complete
  arch-db:
    - arch-database-design-complete
  arch-iface:
    - arch-interface-design-complete
  arch-key:
    - arch-key-mechanisms-complete
  arch-check:
    - arch-hld-complete
    - arch-registry-complete
    - arch-approved
  arch-lld-check:
    - arch-lld-complete
    - arch-module-boundary
    - arch-lld-approved
  design-sdlc:
    - arch-approved
    - arch-lld-approved
    - arch-change-align
    - design-hld-complete
    - design-lld-complete
    - design-spec-align
    - prototype-complete
    - change-request-applied
  plan-sdlc:
    - plan-coverage
    - wo-lld-done
  test-design-sdlc:
    - test-cases-complete
    - test-cases-approved
  test-execution-sdlc:
    - uat-complete
    - bugs-closed
    - test-report-complete
  verification-sdlc:
    - spec-validate
    - spec-trace
    - design-drift
    - arch-drift
    - drift
    - unit-changed
    - mutation-probe
    - ai-spec-review
    - integration-smoke
  plan-basic:
    - plan-coverage
  propose-basic:
    - requirements-complete
    - spec-validate
  design-basic:
    - design-hld-complete
    - design-lld-complete
  archive-check:
    - spec-validate
  propose-sdlc:
    - wo-req-arch-clear
    - prd-complete
    - prd-approved
    - requirements-extended-complete
    - spec-validate
    - typecheck
    - lint
    - unit-changed
