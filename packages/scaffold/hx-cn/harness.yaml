sensors:
  - id: spec-validate
    kind: sensor.script
    execution: computational
    builtin: spec-validate
    on_fail: block
    fix_hint: 修正 delta spec 格式；确保每条 Requirement 至少有一个 Scenario，且需求文本符合 EARS 句式
    stage: dev
    task: propose
  - id: spec-trace
    kind: sensor.script
    execution: computational
    builtin: spec-trace
    on_fail: block
    fix_hint: 为未覆盖的 Scenario 补充测试，或在测试标题中字面引用 Scenario 名称
    stage: dev
    task: verify
  - id: ai-spec-review
    kind: sensor.rubric
    execution: inferential
    builtin: rubric
    on_fail: warn
    budget_tokens: 8000
    fix_hint: 根据 rubric 评审意见收紧规格表述，消除模糊或不可测量的需求
    stage: dev
    task: verify
  - id: fixture-guard
    kind: sensor.fixture
    execution: computational
    trigger: file-save
    scope:
      - tests/fixtures/**
    builtin: fixture-hash
    on_fail: block
    fix_hint: 已批准的 fixture 不可修改；如需变更请通过 waiver 流程重新批准
  - id: typecheck
    kind: sensor.script
    execution: computational
    builtin: typecheck
    on_fail: block
    fix_hint: 修复 tsc 报告的类型错误
    stage: dev
    task: apply
  - id: lint
    kind: sensor.script
    execution: computational
    builtin: lint
    on_fail: block
    fix_hint: 修复 lint 违规
    stage: dev
    task: apply
  - id: unit-changed
    kind: sensor.script
    execution: computational
    builtin: unit-changed
    on_fail: block
    fix_hint: 修复与当前 diff 相关的失败测试
    stage: dev
    task: apply
  - id: mutation-probe
    kind: sensor.mutation
    execution: computational
    builtin: mutation-probe
    on_fail: block
    fix_hint: 加强场景测试——避免桩和恒真断言
    stage: dev
    task: verify
  - id: requirements-complete
    kind: sensor.script
    execution: computational
    builtin: requirements-complete
    on_fail: block
    fix_hint: 填写 requirements/ 并在 proposal.md 中链接 PRD
    stage: dev
    task: propose
  - id: design-hld-complete
    kind: sensor.script
    execution: computational
    builtin: design-hld-complete
    on_fail: block
    fix_hint: 补全 design/overview.md 概要设计章节
    stage: dev
    task: design
  - id: design-lld-complete
    kind: sensor.script
    execution: computational
    builtin: design-lld-complete
    on_fail: warn
    fix_hint: 补充 design/ui/pages.md 与 components LLD
    stage: dev
    task: design
  - id: design-spec-align
    kind: sensor.script
    execution: computational
    builtin: design-spec-align
    on_fail: warn
    fix_hint: 确保设计中的 API 路径出现在 delta spec
    stage: dev
    task: design
  - id: plan-coverage
    kind: sensor.script
    execution: computational
    builtin: plan-coverage
    on_fail: warn
    fix_hint: 运行 hx plan 生成 @design= 与 delivery-trace.yaml
    stage: dev
    task: plan
  - id: design-drift
    kind: sensor.script
    execution: computational
    builtin: design-drift
    on_fail: warn
    fix_hint: 实现 delivery-trace 中的 code_hints 或更新追溯文件
    stage: dev
    task: verify
  - id: prd-complete
    kind: sensor.script
    execution: computational
    builtin: prd-complete
    on_fail: block
    fix_hint: 补全 docs/prd/<slug>.md
    stage: req
    task: prd-writing
  - id: prd-approved
    kind: sensor.script
    execution: computational
    builtin: prd-approved
    on_fail: block
    fix_hint: 人工批准 PRD：hx gate approve --gate prd --prd <slug> --approver <姓名>
    stage: req
    task: prd-writing
  - id: arch-hld-complete
    kind: sensor.script
    execution: computational
    builtin: arch-hld-complete
    on_fail: block
    fix_hint: 补全 docs/architecture/overview.md
    stage: arch
    task: subsystem-division
  - id: arch-registry-complete
    kind: sensor.script
    execution: computational
    builtin: arch-registry-complete
    on_fail: block
    fix_hint: 修复 registry.yaml
    stage: arch
    task: subsystem-division
  - id: arch-lld-complete
    kind: sensor.script
    execution: computational
    builtin: arch-lld-complete
    on_fail: block
    fix_hint: 补全模块 LLD
    stage: arch
    task: internal-interface
  - id: arch-module-boundary
    kind: sensor.script
    execution: computational
    builtin: arch-module-boundary
    on_fail: warn
    fix_hint: 解决 capabilities 重复归属
    stage: arch
    task: internal-interface
  - id: arch-change-align
    kind: sensor.script
    execution: computational
    builtin: arch-change-align
    on_fail: block
    fix_hint: 确保 touched domains 映射到模块 LLD
    stage: dev
    task: design
  - id: arch-approved
    kind: sensor.script
    execution: computational
    builtin: arch-approved
    on_fail: block
    fix_hint: 人工批准全局架构：hx gate approve --gate arch --approver <姓名>
    stage: arch
    task: subsystem-division
  - id: arch-drift
    kind: sensor.script
    execution: computational
    builtin: arch-drift
    on_fail: warn
    fix_hint: 运行 hx arch promote <change> 将 design 沉淀到模块 LLD
    stage: dev
    task: verify
  - id: wo-req-arch-clear
    kind: sensor.script
    execution: computational
    builtin: wo-req-arch-clear
    on_fail: block
    fix_hint: 关闭待审 req/arch 工单：hx wo inbox
    stage: dev
    task: propose
  - id: requirements-extended-complete
    kind: sensor.script
    execution: computational
    builtin: requirements-extended-complete
    on_fail: block
    fix_hint: 填写扩展 requirements/ 制品（调研、业务流程、集成）
    stage: dev
    task: propose
  - id: test-cases-complete
    kind: sensor.script
    execution: computational
    builtin: test-cases-complete
    on_fail: block
    fix_hint: 完成 test-cases/overview.md — hx test-cases init
    stage: test
    task: test-case-design
  - id: test-cases-approved
    kind: sensor.script
    execution: computational
    builtin: test-cases-approved
    on_fail: block
    fix_hint: 提交并批准测试用例：hx test-cases submit
    stage: test
    task: test-case-design
  - id: bugs-closed
    kind: sensor.script
    execution: computational
    builtin: bugs-closed
    on_fail: block
    fix_hint: 关闭或修复 open bug：hx bug list
    stage: dev
    task: verify
  - id: wo-lld-done
    kind: sensor.script
    execution: computational
    builtin: wo-lld-done
    on_fail: block
    fix_hint: 将 lld-design 工单标记完成：hx wo done <id>
    stage: dev
    task: plan
  - id: arch-lld-approved
    kind: sensor.script
    execution: computational
    builtin: arch-lld-approved
    on_fail: block
    fix_hint: 批准模块 LLD：hx approve arch-lld <module> --approver <姓名>
    stage: dev
    task: design
  - id: change-request-applied
    kind: sensor.script
    execution: computational
    builtin: change-request-applied
    on_fail: block
    fix_hint: 批准后应用待处理变更单
    stage: dev
    task: design
