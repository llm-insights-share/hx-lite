version: "1.0"
constitution: constitution.md
profiles:
  lite:
    stages:
      - dev
    dev_tasks:
      - propose
      - apply
      - archive
    suites:
      dev.apply: fast-lite
      dev.propose: fast-lite
  standard:
    stages:
      - req
      - arch
      - dev
      - test
    dev_tasks:
      - plan
      - propose
      - design
      - apply
      - verify
      - archive
    suites:
      dev.design: fast
      dev.apply: fast
      dev.verify: verification
  strict:
    stages:
      - req
      - arch
      - dev
      - test
    dev_tasks:
      - plan
      - propose
      - design
      - apply
      - verify
      - archive
    suites:
      dev.design: fast
      dev.apply: fast
      dev.verify: verification-strict
  enterprise:
    stages:
      - req
      - arch
      - dev
      - test
    dev_tasks:
      - plan
      - propose
      - design
      - apply
      - verify
      - archive
    test_tasks:
      - test-case-design
      - test-execution
    suites:
      dev.propose: propose-sdlc
      dev.design: design-sdlc
      dev.plan: plan-sdlc
      dev.apply: fast
      test.test-case-design: test-design-sdlc
      dev.verify: verification-sdlc
suites:
  fast-lite:
    - spec-validate
  fast:
    - spec-validate
    - typecheck
    - lint
    - unit-changed
  verification:
    - spec-validate
    - spec-trace
  verification-strict:
    - spec-validate
    - spec-trace
    - unit-changed
    - mutation-probe
    - ai-spec-review
  propose-enterprise:
    - prd-complete
    - prd-approved
    - requirements-complete
    - spec-validate
    - typecheck
    - lint
    - unit-changed
  design-enterprise:
    - arch-approved
    - arch-change-align
    - design-hld-complete
    - design-lld-complete
    - design-spec-align
    - prototype-complete
  plan-enterprise:
    - plan-coverage
  verification-enterprise:
    - spec-validate
    - spec-trace
    - design-drift
    - arch-drift
    - unit-changed
    - mutation-probe
    - ai-spec-review
  prd-check:
    - prd-complete
  arch-check:
    - arch-hld-complete
    - arch-registry-complete
    - arch-approved
  arch-lld-check:
    - arch-lld-complete
    - arch-module-boundary
    - arch-lld-approved
  design-sdlc:
    - arch-approved
    - arch-lld-approved
    - arch-change-align
    - design-hld-complete
    - design-lld-complete
    - design-spec-align
    - prototype-complete
    - change-request-applied
  plan-sdlc:
    - plan-coverage
    - wo-lld-done
  test-design-sdlc:
    - test-cases-complete
    - test-cases-approved
  verification-sdlc:
    - spec-validate
    - spec-trace
    - design-drift
    - arch-drift
    - bugs-closed
    - drift
    - uat-complete
    - unit-changed
    - mutation-probe
    - ai-spec-review
  dev.propose:
    - wo-req-arch-clear
    - prd-complete
    - prd-approved
    - requirements-extended-complete
    - spec-validate
    - typecheck
    - lint
    - unit-changed
