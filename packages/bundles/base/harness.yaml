version: "1.0"
constitution: constitution.md

profiles:
  lite:
    phases: [propose, apply, archive]
    stages: [dev]
    dev_tasks: [propose, apply, archive]
    suites:
      apply: fast-lite
      dev.propose: fast-lite
      dev.apply: fast-lite
  standard:
    phases: [propose, design, spec, plan, apply, verify, archive]
    stages: [req, arch, dev, test]
    dev_tasks: [plan, propose, design, apply, verify, archive]
    suites:
      spec: fast
      apply: fast
      verify: verification
      dev.design: fast
      dev.verify: verification
  strict:
    phases: [explore, propose, design, spec, plan, apply, verify, archive]
    stages: [req, arch, dev, test]
    dev_tasks: [plan, propose, design, apply, verify, archive]
    suites:
      spec: fast
      apply: fast
      verify: verification-strict
      dev.verify: verification-strict
  enterprise:
    phases: [explore, propose, design, spec, plan, apply, verify, archive]
    stages: [req, arch, dev, test]
    dev_tasks: [plan, propose, design, apply, verify, archive]
    suites:
      propose: propose-enterprise
      design: design-enterprise
      spec: fast
      plan: plan-enterprise
      apply: fast
      verify: verification-enterprise
      dev.propose: propose-enterprise
      dev.design: design-enterprise
      dev.verify: verification-enterprise
  enterprise-sdlc:
    phases: [explore, propose, design, spec, plan, test-design, apply, verify, archive]
    stages: [req, arch, dev, test]
    dev_tasks: [plan, propose, design, apply, verify, archive]
    test_tasks: [test-case-design, test-execution]
    suites:
      propose: propose-sdlc
      design: design-sdlc
      spec: fast
      plan: plan-sdlc
      test-design: test-design-sdlc
      apply: fast
      verify: verification-sdlc
      dev.propose: propose-sdlc
      dev.design: design-sdlc
      dev.verify: verification-sdlc
      test.test-case-design: test-design-sdlc

suites:
  fast-lite: [spec-validate]
  fast: [spec-validate, typecheck, lint, unit-changed]
  verification: [spec-validate, spec-trace, drift]
  verification-strict: [spec-validate, spec-trace, unit-changed, mutation-probe, ai-spec-review]
  propose-enterprise: [prd-complete, prd-approved, requirements-complete, spec-validate, typecheck, lint, unit-changed]
  design-enterprise: [arch-approved, arch-change-align, design-hld-complete, design-lld-complete, design-spec-align, prototype-complete]
  plan-enterprise: [plan-coverage]
  verification-enterprise: [spec-validate, spec-trace, design-drift, arch-drift, drift, uat-complete, unit-changed, mutation-probe, ai-spec-review]
  prd-check: [prd-complete]
  arch-check: [arch-hld-complete, arch-registry-complete, arch-approved]
  arch-lld-check: [arch-lld-complete, arch-module-boundary, arch-lld-approved]
  propose-sdlc: [wo-prephase-clear, prd-complete, prd-approved, requirements-extended-complete, spec-validate, typecheck, lint, unit-changed]
  design-sdlc: [arch-approved, arch-lld-approved, arch-change-align, design-hld-complete, design-lld-complete, design-spec-align, prototype-complete, change-request-applied]
  plan-sdlc: [plan-coverage, wo-lld-done]
  test-design-sdlc: [test-cases-complete, test-cases-approved]
  verification-sdlc: [spec-validate, spec-trace, design-drift, arch-drift, bugs-closed, drift, uat-complete, unit-changed, mutation-probe, ai-spec-review]

