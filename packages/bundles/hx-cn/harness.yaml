version: "1.0"
constitution: constitution.md

profiles:
  lite:
    phases: [propose, apply, archive]
    suites:
      apply: fast-lite
  standard:
    phases: [propose, design, spec, plan, apply, verify, archive]
    suites:
      spec: fast
      apply: fast
      verify: verification
  strict:
    phases: [explore, propose, design, spec, plan, apply, verify, archive]
    suites:
      spec: fast
      apply: fast
      verify: verification-strict
  enterprise:
    phases: [explore, propose, design, spec, plan, apply, verify, archive]
    suites:
      propose: propose-enterprise
      design: design-enterprise
      spec: fast
      plan: plan-enterprise
      apply: fast
      verify: verification-enterprise

suites:
  fast-lite: [spec-validate]
  fast: [spec-validate, typecheck, lint, unit-changed]
  verification: [spec-validate, spec-trace]
  verification-strict: [spec-validate, spec-trace, unit-changed, mutation-probe, ai-spec-review]
  propose-enterprise: [requirements-complete, spec-validate, typecheck, lint, unit-changed]
  design-enterprise: [design-hld-complete, design-lld-complete, design-spec-align]
  plan-enterprise: [plan-coverage]
  verification-enterprise: [spec-validate, spec-trace, design-drift, unit-changed, mutation-probe, ai-spec-review]

guides:
  - id: requirements-template
    kind: guide.template
    execution: computational
    phase: [propose]
    source: assets/guides/requirements-template/template.md
  - id: ui-pages-template
    kind: guide.template
    execution: computational
    phase: [design]
    source: assets/guides/ui-pages-template/template.md
  - id: prd-writing
    kind: guide.skill
    execution: inferential
    phase: [propose, spec]
    source: assets/guides/prd-writing/SKILL.md
  - id: fe-layout
    kind: guide.skill
    execution: inferential
    phase: [design, apply]
    source: assets/guides/fe-layout/SKILL.md
  - id: design-tokens
    kind: guide.skill
    execution: inferential
    phase: [design, apply]
    source: assets/guides/design-tokens/SKILL.md
  - id: proposal-template
    kind: guide.template
    execution: computational
    phase: [propose]
    source: assets/guides/proposal-template/template.md
  - id: design-template
    kind: guide.template
    execution: computational
    phase: [design]
    source: assets/guides/design-template/template.md
  - id: coding-conventions
    kind: guide.skill
    execution: inferential
    phase: [apply]
    source: assets/guides/coding-conventions/SKILL.md
  - id: spec-writing
    kind: guide.skill
    execution: inferential
    phase: [propose, spec]
    source: assets/guides/spec-writing/SKILL.md
  - id: cmd-explore
    kind: guide.command
    execution: inferential
    phase: [explore]
    source: assets/commands/explore.md
  - id: cmd-propose
    kind: guide.command
    execution: inferential
    phase: [propose]
    source: assets/commands/propose.md
  - id: cmd-design
    kind: guide.command
    execution: inferential
    phase: [design]
    source: assets/commands/design.md
  - id: cmd-spec
    kind: guide.command
    execution: inferential
    phase: [spec]
    source: assets/commands/spec.md
  - id: cmd-plan
    kind: guide.command
    execution: inferential
    phase: [plan]
    source: assets/commands/plan.md
  - id: cmd-apply
    kind: guide.command
    execution: inferential
    phase: [apply]
    source: assets/commands/apply.md
  - id: cmd-verify
    kind: guide.command
    execution: inferential
    phase: [verify]
    source: assets/commands/verify.md
  - id: cmd-archive
    kind: guide.command
    execution: inferential
    phase: [archive]
    source: assets/commands/archive.md

sensors:
  - id: spec-validate
    kind: sensor.script
    execution: computational
    phase: [propose, spec, verify, archive]
    builtin: spec-validate
    on_fail: block
    fix_hint: "修正 delta spec 格式；确保每条 Requirement 至少有一个 Scenario，且需求文本符合 EARS 句式"
  - id: spec-trace
    kind: sensor.script
    execution: computational
    phase: [verify]
    builtin: spec-trace
    on_fail: block
    fix_hint: "为未覆盖的 Scenario 补充测试，或在测试标题中字面引用 Scenario 名称"
  - id: ai-spec-review
    kind: sensor.rubric
    execution: inferential
    phase: [verify]
    builtin: rubric
    on_fail: warn
    budget_tokens: 8000
    fix_hint: "根据 rubric 评审意见收紧规格表述，消除模糊或不可测量的需求"
  - id: fixture-guard
    kind: sensor.fixture
    execution: computational
    trigger: file-save
    scope: ["tests/fixtures/**"]
    builtin: fixture-hash
    on_fail: block
    fix_hint: "已批准的 fixture 不可修改；如需变更请通过 waiver 流程重新批准"
  - id: typecheck
    kind: sensor.script
    execution: computational
    phase: [apply, verify]
    builtin: typecheck
    on_fail: block
    fix_hint: "修复 tsc 报告的类型错误"
  - id: lint
    kind: sensor.script
    execution: computational
    phase: [apply, verify]
    builtin: lint
    on_fail: block
    fix_hint: "修复 lint 违规"
  - id: unit-changed
    kind: sensor.script
    execution: computational
    phase: [apply, verify]
    builtin: unit-changed
    on_fail: block
    fix_hint: "修复与当前 diff 相关的失败测试"
  - id: mutation-probe
    kind: sensor.mutation
    execution: computational
    phase: [verify]
    builtin: mutation-probe
    on_fail: block
    fix_hint: "加强场景测试——避免桩和恒真断言"
  - id: requirements-complete
    kind: sensor.script
    execution: computational
    phase: [propose]
    builtin: requirements-complete
    on_fail: block
    fix_hint: "填写 requirements/ 并在 proposal.md 中链接 PRD"
  - id: design-hld-complete
    kind: sensor.script
    execution: computational
    phase: [design]
    builtin: design-hld-complete
    on_fail: block
    fix_hint: "补全 design/overview.md 概要设计章节"
  - id: design-lld-complete
    kind: sensor.script
    execution: computational
    phase: [design]
    builtin: design-lld-complete
    on_fail: warn
    fix_hint: "补充 design/ui/pages.md 与 components LLD"
  - id: design-spec-align
    kind: sensor.script
    execution: computational
    phase: [design, spec]
    builtin: design-spec-align
    on_fail: warn
    fix_hint: "确保设计中的 API 路径出现在 delta spec"
  - id: plan-coverage
    kind: sensor.script
    execution: computational
    phase: [plan]
    builtin: plan-coverage
    on_fail: warn
    fix_hint: "运行 hx plan 生成 @design= 与 delivery-trace.yaml"
  - id: design-drift
    kind: sensor.script
    execution: computational
    phase: [verify]
    builtin: design-drift
    on_fail: warn
    fix_hint: "实现 delivery-trace 中的 code_hints 或更新追溯文件"
