sensors:
  - id: spec-validate
    kind: sensor.script
    execution: computational
    phase: [propose, spec, verify, archive]
    builtin: spec-validate
    on_fail: block
    fix_hint: "修正 delta spec 格式；确保每条 Requirement 至少有一个 Scenario，且需求文本符合 EARS 句式"
  - id: spec-trace
    kind: sensor.script
    execution: computational
    phase: [verify]
    builtin: spec-trace
    on_fail: block
    fix_hint: "为未覆盖的 Scenario 补充测试，或在测试标题中字面引用 Scenario 名称"
  - id: ai-spec-review
    kind: sensor.rubric
    execution: inferential
    phase: [verify]
    builtin: rubric
    on_fail: warn
    budget_tokens: 8000
    fix_hint: "根据 rubric 评审意见收紧规格表述，消除模糊或不可测量的需求"
  - id: fixture-guard
    kind: sensor.fixture
    execution: computational
    trigger: file-save
    scope: ["tests/fixtures/**"]
    builtin: fixture-hash
    on_fail: block
    fix_hint: "已批准的 fixture 不可修改；如需变更请通过 waiver 流程重新批准"
  - id: typecheck
    kind: sensor.script
    execution: computational
    phase: [apply, verify]
    builtin: typecheck
    on_fail: block
    fix_hint: "修复 tsc 报告的类型错误"
  - id: lint
    kind: sensor.script
    execution: computational
    phase: [apply, verify]
    builtin: lint
    on_fail: block
    fix_hint: "修复 lint 违规"
  - id: unit-changed
    kind: sensor.script
    execution: computational
    phase: [apply, verify]
    builtin: unit-changed
    on_fail: block
    fix_hint: "修复与当前 diff 相关的失败测试"
  - id: mutation-probe
    kind: sensor.mutation
    execution: computational
    phase: [verify]
    builtin: mutation-probe
    on_fail: block
    fix_hint: "加强场景测试——避免桩和恒真断言"
  - id: requirements-complete
    kind: sensor.script
    execution: computational
    phase: [propose]
    builtin: requirements-complete
    on_fail: block
    fix_hint: "填写 requirements/ 并在 proposal.md 中链接 PRD"
  - id: design-hld-complete
    kind: sensor.script
    execution: computational
    phase: [design]
    builtin: design-hld-complete
    on_fail: block
    fix_hint: "补全 design/overview.md 概要设计章节"
  - id: design-lld-complete
    kind: sensor.script
    execution: computational
    phase: [design]
    builtin: design-lld-complete
    on_fail: warn
    fix_hint: "补充 design/ui/pages.md 与 components LLD"
  - id: design-spec-align
    kind: sensor.script
    execution: computational
    phase: [design, spec]
    builtin: design-spec-align
    on_fail: warn
    fix_hint: "确保设计中的 API 路径出现在 delta spec"
  - id: plan-coverage
    kind: sensor.script
    execution: computational
    phase: [plan]
    builtin: plan-coverage
    on_fail: warn
    fix_hint: "运行 hx plan 生成 @design= 与 delivery-trace.yaml"
  - id: design-drift
    kind: sensor.script
    execution: computational
    phase: [verify]
    builtin: design-drift
    on_fail: warn
    fix_hint: "实现 delivery-trace 中的 code_hints 或更新追溯文件"
  - id: prd-complete
    kind: sensor.script
    execution: computational
    phase: [prd, propose]
    builtin: prd-complete
    on_fail: block
    fix_hint: "补全 docs/prd/<slug>.md"
  - id: prd-approved
    kind: sensor.script
    execution: computational
    phase: [prd, propose]
    builtin: prd-approved
    on_fail: block
    fix_hint: "人工批准 PRD：hx gate approve --gate prd --prd <slug> --approver <姓名>"
  - id: arch-hld-complete
    kind: sensor.script
    execution: computational
    phase: [arch]
    builtin: arch-hld-complete
    on_fail: block
    fix_hint: "补全 docs/architecture/overview.md"
  - id: arch-registry-complete
    kind: sensor.script
    execution: computational
    phase: [arch]
    builtin: arch-registry-complete
    on_fail: block
    fix_hint: "修复 registry.yaml"
  - id: arch-lld-complete
    kind: sensor.script
    execution: computational
    phase: [arch-lld]
    builtin: arch-lld-complete
    on_fail: block
    fix_hint: "补全模块 LLD"
  - id: arch-module-boundary
    kind: sensor.script
    execution: computational
    phase: [arch-lld]
    builtin: arch-module-boundary
    on_fail: warn
    fix_hint: "解决 capabilities 重复归属"
  - id: arch-change-align
    kind: sensor.script
    execution: computational
    phase: [design]
    builtin: arch-change-align
    on_fail: block
    fix_hint: "确保 touched domains 映射到模块 LLD"
  - id: arch-approved
    kind: sensor.script
    execution: computational
    phase: [arch]
    builtin: arch-approved
    on_fail: block
    fix_hint: "人工批准全局架构：hx gate approve --gate arch --approver <姓名>"
  - id: arch-drift
    kind: sensor.script
    execution: computational
    phase: [verify]
    builtin: arch-drift
    on_fail: warn
    fix_hint: "运行 hx arch promote <change> 将 design 沉淀到模块 LLD"
