  - id: cmd-propose
    kind: guide.command
    execution: inferential
    phase: [propose]
    source: assets/commands/propose.md
  - id: cmd-design
    kind: guide.command
    execution: inferential
    phase: [design]
    source: assets/commands/design.md
  - id: cmd-spec
    kind: guide.command
    execution: inferential
    phase: [spec]
    source: assets/commands/spec.md
  - id: cmd-plan
    kind: guide.command
    execution: inferential
    phase: [plan]
    source: assets/commands/plan.md
  - id: cmd-apply
    kind: guide.command
    execution: inferential
    phase: [apply]
    source: assets/commands/apply.md
  - id: cmd-verify
    kind: guide.command
    execution: inferential
    phase: [verify]
    source: assets/commands/verify.md
  - id: cmd-archive
    kind: guide.command
    execution: inferential
    phase: [archive]
    source: assets/commands/archive.md
  - id: prd-template
    kind: guide.template
    execution: computational
